
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  .wrap { font-family: var(--font-mono); background: var(--color-background-primary); color: var(--color-text-primary); min-height: 520px; display: flex; flex-direction: column; border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); overflow: hidden; }
  .topbar { display: flex; align-items: center; gap: 10px; padding: 10px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .dot { width: 10px; height: 10px; border-radius: 50%; }
  .topbar-title { font-size: 13px; color: var(--color-text-secondary); flex: 1; text-align: center; }
  .cfg { padding: 16px; border-bottom: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); display: flex; flex-direction: column; gap: 8px; }
  .cfg-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .cfg label { font-size: 11px; color: var(--color-text-secondary); display: block; margin-bottom: 3px; letter-spacing: 0.04em; }
  .cfg input { width: 100%; font-family: var(--font-mono); font-size: 12px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
  .cfg input:focus { outline: none; border-color: var(--color-border-primary); }
  .cfg-status { font-size: 11px; padding: 5px 10px; border-radius: var(--border-radius-md); }
  .cfg-status.ok { background: var(--color-background-success); color: var(--color-text-success); }
  .cfg-status.err { background: var(--color-background-danger); color: var(--color-text-danger); }
  .messages { flex: 1; overflow-y: auto; padding: 16px; display: flex; flex-direction: column; gap: 12px; min-height: 240px; max-height: 340px; }
  .msg { display: flex; flex-direction: column; gap: 4px; max-width: 92%; }
  .msg.user { align-self: flex-end; align-items: flex-end; }
  .msg.agent { align-self: flex-start; align-items: flex-start; }
  .bubble { font-size: 13px; line-height: 1.6; padding: 8px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-tertiary); }
  .msg.user .bubble { background: var(--color-background-info); color: var(--color-text-primary); border-color: var(--color-border-info); }
  .msg.agent .bubble { background: var(--color-background-secondary); color: var(--color-text-primary); white-space: pre-wrap; }
  .tool-call { font-size: 11px; padding: 6px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-tertiary); color: var(--color-text-secondary); display: flex; align-items: flex-start; gap: 8px; }
  .tool-call i { font-size: 13px; flex-shrink: 0; margin-top: 1px; }
  .tool-call.running { color: var(--color-text-warning); border-color: var(--color-border-warning); background: var(--color-background-warning); }
  .tool-call.done { color: var(--color-text-success); border-color: var(--color-border-success); background: var(--color-background-success); }
  .tool-call.error { color: var(--color-text-danger); border-color: var(--color-border-danger); background: var(--color-background-danger); }
  .tool-detail { font-size: 10px; opacity: 0.75; margin-top: 2px; word-break: break-all; }
  .inputrow { display: flex; gap: 8px; padding: 12px 16px; border-top: 0.5px solid var(--color-border-tertiary); background: var(--color-background-secondary); }
  .inputrow input { flex: 1; font-family: var(--font-mono); font-size: 13px; padding: 7px 12px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); }
  .inputrow input:focus { outline: none; border-color: var(--color-border-primary); }
  .inputrow button { font-family: var(--font-sans); font-size: 13px; padding: 7px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: var(--color-background-primary); color: var(--color-text-primary); cursor: pointer; flex-shrink: 0; }
  .inputrow button:hover { background: var(--color-background-tertiary); }
  .inputrow button:disabled { opacity: 0.4; cursor: not-allowed; }
  .spinner { display: inline-block; width: 10px; height: 10px; border: 1.5px solid var(--color-border-secondary); border-top-color: var(--color-text-secondary); border-radius: 50%; animation: spin 0.7s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .cfg-toggle { font-size: 11px; color: var(--color-text-secondary); cursor: pointer; padding: 4px 0; display: flex; align-items: center; gap: 5px; background: none; border: none; font-family: var(--font-mono); }
  .cfg-toggle:hover { color: var(--color-text-primary); }
  .quick-btns { display: flex; flex-wrap: wrap; gap: 6px; padding: 8px 16px; border-bottom: 0.5px solid var(--color-border-tertiary); }
  .qbtn { font-family: var(--font-mono); font-size: 11px; padding: 4px 10px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-secondary); cursor: pointer; }
  .qbtn:hover { background: var(--color-background-secondary); color: var(--color-text-primary); }
  .empty-state { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 8px; color: var(--color-text-secondary); font-size: 12px; min-height: 160px; }
  .empty-state i { font-size: 28px; opacity: 0.3; }
</style>

<h2 class="sr-only">GitHub Notes Answer Agent — chat interface to read questions from your repo and write AI-generated answers back</h2>
<div class="wrap" id="app">
  <div class="topbar">
    <div class="dot" style="background:#ff5f57"></div>
    <div class="dot" style="background:#febc2e"></div>
    <div class="dot" style="background:#28c840"></div>
    <span class="topbar-title">notes-answer-agent</span>
    <button class="cfg-toggle" id="cfgToggle" onclick="toggleCfg()"><i class="ti ti-settings" aria-hidden="true"></i> config</button>
  </div>

  <div class="cfg" id="cfgPanel">
    <div class="cfg-row">
      <div>
        <label>ANTHROPIC_API_KEY</label>
        <input type="password" id="anthropicKey" placeholder="sk-ant-..." />
      </div>
      <div>
        <label>GITHUB_TOKEN (PAT)</label>
        <input type="password" id="ghToken" placeholder="github_pat_..." />
      </div>
    </div>
    <div class="cfg-row">
      <div>
        <label>GITHUB_REPO</label>
        <input type="text" id="ghRepo" placeholder="username/repo-name" />
      </div>
      <div>
        <label>BRANCH</label>
        <input type="text" id="ghBranch" value="main" placeholder="main" />
      </div>
    </div>
    <div class="cfg-row">
      <div>
        <label>QUESTIONS_FILE</label>
        <input type="text" id="questionsFile" value="questions.md" placeholder="questions.md" />
      </div>
      <div>
        <label>ANSWERS_FILE</label>
        <input type="text" id="answersFile" value="answers.md" placeholder="answers.md" />
      </div>
    </div>
    <div id="cfgStatus"></div>
  </div>

  <div class="quick-btns">
    <button class="qbtn" onclick="quickSend('Read my questions file and answer all questions in answers.md')">▶ answer all questions</button>
    <button class="qbtn" onclick="quickSend('List the files in my repo')">▶ list files</button>
    <button class="qbtn" onclick="quickSend('Show me what questions are in questions.md')">▶ show questions</button>
    <button class="qbtn" onclick="quickSend('Show me the current contents of answers.md')">▶ show answers</button>
  </div>

  <div class="messages" id="messages">
    <div class="empty-state">
      <i class="ti ti-terminal-2" aria-hidden="true"></i>
      <span>configure your credentials above, then chat</span>
    </div>
  </div>

  <div class="inputrow">
    <input type="text" id="userInput" placeholder="e.g. answer all questions in my notes..." onkeydown="if(event.key==='Enter' && !event.shiftKey){ event.preventDefault(); sendMessage(); }" />
    <button id="sendBtn" onclick="sendMessage()"><i class="ti ti-arrow-right" aria-hidden="true"></i></button>
  </div>
</div>

<script>
let conversationHistory = [];
let isRunning = false;

function cfg(id) { return document.getElementById(id).value.trim(); }

function toggleCfg() {
  const panel = document.getElementById('cfgPanel');
  const toggle = document.getElementById('cfgToggle');
  const hidden = panel.style.display === 'none';
  panel.style.display = hidden ? '' : 'none';
  toggle.innerHTML = hidden
    ? '<i class="ti ti-settings" aria-hidden="true"></i> config'
    : '<i class="ti ti-settings" aria-hidden="true"></i> config';
}

function ghRequest(method, path, body) {
  const repo = cfg('ghRepo');
  const token = cfg('ghToken');
  const branch = cfg('ghBranch') || 'main';
  const url = `https://api.github.com/repos/${repo}/${path}`;
  const opts = {
    method,
    headers: {
      'Authorization': `Bearer ${token}`,
      'Accept': 'application/vnd.github+json',
      'X-GitHub-Api-Version': '2022-11-28',
      'Content-Type': 'application/json',
    }
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(url, opts).then(r => {
    if (!r.ok) return r.text().then(t => { throw new Error(`GitHub ${r.status}: ${t.slice(0,200)}`); });
    return r.json();
  });
}

async function executeTool(name, input) {
  if (name === 'list_repo_files') {
    const branch = cfg('ghBranch') || 'main';
    const path = input.path || '';
    const data = await ghRequest('GET', `contents/${path}?ref=${branch}`);
    const files = Array.isArray(data) ? data.map(f => `${f.type === 'dir' ? '📁' : '📄'} ${f.path}`).join('\n') : data.name;
    return files || 'No files found.';
  }
  if (name === 'read_file') {
    const branch = cfg('ghBranch') || 'main';
    const data = await ghRequest('GET', `contents/${input.path}?ref=${branch}`);
    return atob(data.content.replace(/\n/g, ''));
  }
  if (name === 'write_file') {
    const branch = cfg('ghBranch') || 'main';
    let sha = undefined;
    try {
      const existing = await ghRequest('GET', `contents/${input.path}?ref=${branch}`);
      sha = existing.sha;
    } catch(e) {}
    const encoded = btoa(unescape(encodeURIComponent(input.content)));
    const body = { message: input.commit_message || `chore: update ${input.path}`, content: encoded, branch };
    if (sha) body.sha = sha;
    await ghRequest('PUT', `contents/${input.path}`, body);
    return `Successfully wrote ${input.path} to ${cfg('ghRepo')} (branch: ${branch})`;
  }
  throw new Error(`Unknown tool: ${name}`);
}

const TOOLS = [
  {
    name: 'list_repo_files',
    description: 'List files and directories in the GitHub repo at an optional path.',
    input_schema: {
      type: 'object',
      properties: {
        path: { type: 'string', description: 'Directory path to list. Use empty string for root.' }
      },
      required: []
    }
  },
  {
    name: 'read_file',
    description: 'Read the contents of a file from the GitHub repo.',
    input_schema: {
      type: 'object',
      properties: {
        path: { type: 'string', description: 'File path in the repo, e.g. questions.md' }
      },
      required: ['path']
    }
  },
  {
    name: 'write_file',
    description: 'Write or update a file in the GitHub repo. Creates it if it does not exist.',
    input_schema: {
      type: 'object',
      properties: {
        path: { type: 'string', description: 'File path to write, e.g. answers.md' },
        content: { type: 'string', description: 'Full file content as a string' },
        commit_message: { type: 'string', description: 'Git commit message' }
      },
      required: ['path', 'content']
    }
  }
];

const SYSTEM = `You are a helpful notes assistant with access to the user's GitHub repository.
You can list files, read markdown files, and write files back to the repo.

When asked to answer questions:
1. Read the questions file (default: questions.md)
2. Extract all questions
3. Generate thorough, clear answers for each one in Markdown format
4. Write the answers to the answers file (default: answers.md) with a ## heading per question
5. Confirm what you did

Current repo config: repo=${cfg('ghRepo') || '(not set)'}, branch=${cfg('ghBranch') || 'main'}, questions file=${cfg('questionsFile') || 'questions.md'}, answers file=${cfg('answersFile') || 'answers.md'}
Always use these file paths unless the user specifies otherwise.`;

function addMsg(role, content) {
  const msgs = document.getElementById('messages');
  const empties = msgs.querySelectorAll('.empty-state');
  empties.forEach(e => e.remove());
  const div = document.createElement('div');
  div.className = `msg ${role === 'user' ? 'user' : 'agent'}`;
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.textContent = content;
  div.appendChild(bubble);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return bubble;
}

function addToolCall(toolName, input, state) {
  const msgs = document.getElementById('messages');
  const div = document.createElement('div');
  div.className = `msg agent`;
  const tc = document.createElement('div');
  tc.className = `tool-call ${state}`;
  const icon = state === 'running' ? 'ti-loader-2' : state === 'done' ? 'ti-check' : 'ti-x';
  const detail = input.path || (input.content ? input.path : '') || '';
  tc.innerHTML = `<i class="ti ${icon}" aria-hidden="true" style="${state==='running'?'animation:spin 0.7s linear infinite':''}"></i><div><div><strong>${toolName}</strong></div>${detail ? `<div class="tool-detail">${detail}</div>` : ''}</div>`;
  div.appendChild(tc);
  msgs.appendChild(div);
  msgs.scrollTop = msgs.scrollHeight;
  return tc;
}

function updateToolCall(tc, state, detail) {
  tc.className = `tool-call ${state}`;
  const icon = state === 'running' ? 'ti-loader-2' : state === 'done' ? 'ti-check' : 'ti-x';
  const nameEl = tc.querySelector('strong');
  const name = nameEl ? nameEl.textContent : '';
  tc.innerHTML = `<i class="ti ${icon}" aria-hidden="true"></i><div><div><strong>${name}</strong></div>${detail ? `<div class="tool-detail">${detail}</div>` : ''}</div>`;
}

async function runAgentLoop(userMessage) {
  conversationHistory.push({ role: 'user', content: userMessage });

  while (true) {
    const systemWithConfig = `You are a helpful notes assistant with access to the user's GitHub repository.
You can list files, read markdown files, and write files back to the repo.

When asked to answer questions:
1. Read the questions file
2. Extract all questions
3. Generate thorough, clear answers for each one in Markdown format
4. Write the answers to the answers file with a ## heading per question followed by the answer
5. Confirm what you did

Repo: ${cfg('ghRepo') || '(not set)'}, Branch: ${cfg('ghBranch') || 'main'}, Questions file: ${cfg('questionsFile') || 'questions.md'}, Answers file: ${cfg('answersFile') || 'answers.md'}`;

    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'x-api-key': cfg('anthropicKey'),
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true',
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 4096,
        system: systemWithConfig,
        tools: TOOLS,
        messages: conversationHistory,
      })
    });

    if (!resp.ok) {
      const err = await resp.text();
      throw new Error(`Anthropic API error ${resp.status}: ${err.slice(0,300)}`);
    }

    const data = await resp.json();
    conversationHistory.push({ role: 'assistant', content: data.content });

    if (data.stop_reason === 'end_turn') {
      const text = data.content.filter(b => b.type === 'text').map(b => b.text).join('\n');
      if (text) addMsg('agent', text);
      break;
    }

    if (data.stop_reason === 'tool_use') {
      const textBlocks = data.content.filter(b => b.type === 'text');
      if (textBlocks.length) {
        const txt = textBlocks.map(b => b.text).join('\n');
        if (txt.trim()) addMsg('agent', txt);
      }

      const toolUseBlocks = data.content.filter(b => b.type === 'tool_use');
      const toolResults = [];

      for (const block of toolUseBlocks) {
        const tc = addToolCall(block.name, block.input, 'running');
        try {
          const result = await executeTool(block.name, block.input);
          const preview = typeof result === 'string' ? result.slice(0, 80) + (result.length > 80 ? '…' : '') : 'done';
          updateToolCall(tc, 'done', preview);
          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: String(result) });
        } catch(e) {
          updateToolCall(tc, 'error', e.message.slice(0, 100));
          toolResults.push({ type: 'tool_result', tool_use_id: block.id, content: `Error: ${e.message}`, is_error: true });
        }
      }

      conversationHistory.push({ role: 'user', content: toolResults });
      continue;
    }

    break;
  }
}

async function sendMessage() {
  if (isRunning) return;
  const input = document.getElementById('userInput');
  const btn = document.getElementById('sendBtn');
  const text = input.value.trim();
  if (!text) return;

  if (!cfg('anthropicKey')) { showStatus('err', 'Anthropic API key required'); return; }
  if (!cfg('ghToken')) { showStatus('err', 'GitHub token required'); return; }
  if (!cfg('ghRepo')) { showStatus('err', 'GitHub repo required (e.g. user/repo)'); return; }

  document.getElementById('cfgStatus').innerHTML = '';
  addMsg('user', text);
  input.value = '';
  isRunning = true;
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div>';

  try {
    await runAgentLoop(text);
  } catch(e) {
    addMsg('agent', `Error: ${e.message}`);
  } finally {
    isRunning = false;
    btn.disabled = false;
    btn.innerHTML = '<i class="ti ti-arrow-right" aria-hidden="true"></i>';
  }
}

function quickSend(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function showStatus(type, msg) {
  const el = document.getElementById('cfgStatus');
  el.className = 'cfg-status ' + type;
  el.textContent = msg;
}
</script>
